<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Smart Trash Routes</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <ion-list>
        <ion-item routerLink="/dashboard" routerDirection="root">
          <ion-icon name="home" slot="start"></ion-icon>
          <ion-label>Dashboard</ion-label>
        </ion-item>
        <ion-item routerLink="/mapa" routerDirection="root">
          <ion-icon name="map" slot="start"></ion-icon>
          <ion-label>Mapa de Rutas</ion-label>
        </ion-item>
        <ion-item routerLink="/reportar" routerDirection="root">
          <ion-icon name="camera" slot="start"></ion-icon>
          <ion-label>Reportar Residuo</ion-label>
        </ion-item>
        <ion-item routerLink="/ajustes" routerDirection="root">
          <ion-icon name="settings" slot="start"></ion-icon>
          <ion-label>Ajustes</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>
  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
